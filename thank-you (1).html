<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks — Social Story Co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://calendly.com">
<link rel="preconnect" href="https://assets.calendly.com">
<style>
  :root{
    --bg: #241246;
    --surface: #341A5E;
    --ink: #F4EFE8;
    --muted: #B4A7D6;
    --rust: #F2C94C;
    --cream: #F4EFE8;
    --line: #4A2E7A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background-color:var(--bg);
    background-image:
      radial-gradient(ellipse 900px 700px at 12% -5%, rgba(242,201,76,0.10), transparent 55%),
      radial-gradient(ellipse 1000px 800px at 95% 20%, rgba(107,47,160,0.35), transparent 60%),
      radial-gradient(ellipse 800px 600px at 20% 90%, rgba(70,85,184,0.14), transparent 55%),
      url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    color:var(--ink);
    font-family:'DM Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;text-decoration:none;}
  nav{
    padding:16px 32px;
    border-bottom:1px solid var(--line);
    background:rgba(36,18,70,0.9);
  }
  .brand-logo{height:38px; width:auto;}
  .content{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 24px;
    text-align:center;
  }
  .content-inner{ max-width:520px; width:100%; }
  .icon{
    width:60px; height:60px;
    border-radius:50%;
    background:var(--rust);
    color:var(--bg);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:800;
    margin:0 auto 26px;
  }
  h1{
    font-family:'Archivo', sans-serif;
    font-weight:800;
    font-size:36px;
    margin-bottom:14px;
    letter-spacing:-0.02em;
  }
  p{
    color:var(--muted);
    font-size:16px;
    margin-bottom:12px;
  }
  .calendly-wrap{
    position:relative; max-width:480px; margin:28px auto 20px;
    background:var(--surface);
    border-radius:12px;
    border:1px solid var(--line);
    overflow:hidden;
  }
  #calendlyLoading{ color:var(--muted); font-size:14px; text-align:center; padding:60px 0; margin:0; }
  .calendly-inline-widget{ min-width:280px; height:480px; }
  .fallback{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 22px;
    margin:24px 0;
    font-size:14.5px;
  }
  .fallback strong{ color:var(--cream); }
  .back-link{
    display:inline-block;
    margin-top:10px;
    color:var(--rust);
    font-weight:600;
    font-size:15px;
    border-bottom:1.5px solid var(--rust);
    padding-bottom:2px;
  }
  footer{
    padding:24px 32px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<nav>
  <img src="logo.png" alt="Social Story Co" class="brand-logo">
</nav>

<div class="content">
  <div class="content-inner">
    <div class="icon">✓</div>
    <h1>Thanks — one last step.</h1>
    <p>We're excited to hear more about your business. Grab a time below that suits you — we'll call you then.</p>

    <div class="calendly-wrap">
      <p id="calendlyLoading">Loading available times...</p>
      <div class="calendly-inline-widget" data-url="https://calendly.com/socialstory-co/30min" onload="document.getElementById('calendlyLoading').style.display='none';"></div>
    </div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    <script>
      window.addEventListener('message', function(e){
        if (e.data.event && e.data.event.indexOf('calendly') === 0){
          const loadingText = document.getElementById('calendlyLoading');
          if (loadingText) loadingText.style.display = 'none';
        }
      });
    </script>

    <div class="fallback">Can't find a time that works? Email us directly at <strong>socialstoryco@gmail.com</strong>.</div>
    <a href="index.html" class="back-link">Back to the homepage</a>
  </div>
</div>

<footer>
  Social Story Co — Performance Ad Creative
</footer>

</body>
</html>
